<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChironMotion Studio | IMU / Vision 跳躍動作分析</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, '');
        var hash = window.location.hash.replace('#', '').toLowerCase();
        var match = hash.match(/^(imu|vision)(?:-(terms|privacy|ai))?$/);

        if (path === '/legal' && match) {
          var app = match[1];
          var section = match[2] || 'terms';
          window.history.replaceState(null, '', '/legal/' + app + '/' + section + window.location.search);
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              brand: {
                blue: '#0044FF', // More vibrant blue
                cyan: '#00D1FF', // More vibrant cyan
                green: '#00E699', // More vibrant green
                dark: '#030712', // Deeper slate-950
              },
              slate: {
                950: '#030712',
              }
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --brand-blue: #0044FF;
        --brand-cyan: #00D1FF;
      }
      body {
        background-color: #ffffff;
        color: #030712;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      html {
        scroll-padding-top: 6rem;
      }
      .glass-pro {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass-pro {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card-premium {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.04);
        box-shadow: 
          0 10px 40px -10px rgba(0, 0, 0, 0.05),
          0 0 1px 0 rgba(0, 0, 0, 0.1);
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .glass-card-premium:hover {
        transform: translateY(-4px);
        box-shadow: 
          0 20px 60px -15px rgba(0, 0, 0, 0.1),
          0 0 1px 0 rgba(0, 0, 0, 0.15);
        border-color: rgba(0, 68, 255, 0.1);
      }
      .text-gradient-premium {
        background: linear-gradient(135deg, #0044FF 0%, #00D1FF 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-gradient-brand {
        background: linear-gradient(135deg, #0044FF 0%, #00CC88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-gradient-brand {
        background: linear-gradient(135deg, #0044FF 0%, #00CC88 100%);
        color: white;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        border: none;
        box-shadow: 0 10px 20px -5px rgba(0, 68, 255, 0.3);
      }
      .btn-gradient-brand:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
        box-shadow: 0 15px 30px -5px rgba(0, 68, 255, 0.4);
      }
      .btn-gradient-brand:active {
        transform: translateY(0);
        filter: brightness(1);
      }
      .bg-glow-blue {
        background: radial-gradient(circle at center, rgba(0, 68, 255, 0.15) 0%, transparent 70%);
      }
      /* Reveal Animation */
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>

{

}
</script>

</head>

</html>
